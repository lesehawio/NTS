<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دفترچه یادداشت · NTS</title>
    <link rel="icon" href="https://raw.githubusercontent.com/lesehawio/NTS/main/NTS%20LOGO.png" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.light {
            background: linear-gradient(145deg, #fdf2f8, #fce7f3);
            color: #4a1942;
        }

        body.dark {
            background: linear-gradient(145deg, #1a0f1a, #2d1a2d);
            color: #f5e6f0;
        }

        body.dark .container {
            background: rgba(40, 20, 40, 0.7);
            border-color: rgba(244, 114, 182, 0.08);
        }

        body.dark .note-card {
            background: rgba(60, 30, 60, 0.6);
            border-color: rgba(244, 114, 182, 0.06);
        }

        body.dark .note-card:hover {
            background: rgba(80, 40, 80, 0.7);
        }

        body.dark .note-card .note-title {
            color: #f5e6f0;
        }

        body.dark .note-card .note-preview {
            color: #c9a8b8;
        }

        body.dark .note-card .note-meta {
            color: #a08090;
            border-top-color: rgba(244, 114, 182, 0.04);
        }

        body.dark .brand h1 {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.dark .btn {
            background: rgba(244, 114, 182, 0.06);
            color: #c9a8b8;
            border-color: rgba(244, 114, 182, 0.06);
        }

        body.dark .btn:hover {
            background: rgba(244, 114, 182, 0.12);
        }

        body.dark .btn-primary {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
        }

        body.dark .modal {
            background: rgba(40, 20, 40, 0.92);
            border-color: rgba(244, 114, 182, 0.06);
        }

        body.dark .modal-header h2 {
            color: #f5e6f0;
        }

        body.dark .form-group label {
            color: #c9a8b8;
        }

        body.dark .form-group input,
        body.dark .form-group textarea {
            background: rgba(60, 30, 60, 0.4);
            border-color: rgba(244, 114, 182, 0.08);
            color: #f5e6f0;
        }

        body.dark .form-group input:focus,
        body.dark .form-group textarea:focus {
            border-color: rgba(236, 72, 153, 0.2);
        }

        body.dark .empty-state {
            color: #a08090;
        }

        body.dark .empty-state h3 {
            color: #f5e6f0;
        }

        body.dark .notes-header h2 {
            color: #f5e6f0;
        }

        body.dark .notes-header .count {
            color: #a08090;
            background: rgba(244, 114, 182, 0.06);
            border-color: rgba(244, 114, 182, 0.04);
        }

        body.dark .toast {
            background: rgba(40, 20, 40, 0.92);
            color: #f5e6f0;
            border-color: rgba(244, 114, 182, 0.06);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px 28px;
            box-shadow: 0 20px 60px rgba(157, 78, 221, 0.08);
            border: 1px solid rgba(244, 114, 182, 0.08);
            transition: background 0.3s ease;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(244, 114, 182, 0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-wrapper {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand h1 {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #be185d, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 40px;
            border: none;
            font-family: inherit;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(244, 114, 182, 0.06);
            color: #9d6b8a;
            border: 1px solid rgba(244, 114, 182, 0.06);
        }

        .btn:hover {
            background: rgba(244, 114, 182, 0.12);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(236, 72, 153, 0.15);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #ec4899, #db2777);
            box-shadow: 0 6px 24px rgba(236, 72, 153, 0.2);
        }

        .btn-icon {
            padding: 6px 10px;
            font-size: 0.8rem;
            background: transparent;
            border: none;
            color: #9d6b8a;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: rgba(244, 114, 182, 0.06);
        }

        body.dark .btn-icon {
            color: #c9a8b8;
        }

        body.dark .btn-icon:hover {
            background: rgba(244, 114, 182, 0.06);
        }

        /* ===== NOTES ===== */
        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .notes-header h2 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a1942;
        }

        .notes-header .count {
            font-size: 0.6rem;
            color: #9d6b8a;
            background: rgba(244, 114, 182, 0.06);
            padding: 1px 10px;
            border-radius: 40px;
            border: 1px solid rgba(244, 114, 182, 0.04);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(244, 114, 182, 0.06);
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .note-card:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(244, 114, 182, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(157, 78, 221, 0.06);
        }

        .note-card .note-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4a1942;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-card .note-preview {
            font-size: 0.55rem;
            color: #7a5a6a;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .note-card .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(244, 114, 182, 0.04);
            font-size: 0.45rem;
            color: #9d6b8a;
        }

        .note-card .note-actions {
            position: absolute;
            top: 6px;
            left: 6px;
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .note-card:hover .note-actions {
            opacity: 1;
        }

        .note-card .note-actions button {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(244, 114, 182, 0.06);
            border-radius: 40px;
            padding: 2px 7px;
            font-size: 0.45rem;
            cursor: pointer;
            color: #7a5a6a;
            transition: 0.2s;
        }

        .note-card .note-actions button:hover {
            background: rgba(244, 114, 182, 0.08);
            color: #be185d;
        }

        body.dark .note-card .note-actions button {
            background: rgba(60, 30, 60, 0.8);
            color: #c9a8b8;
        }

        body.dark .note-card .note-actions button:hover {
            background: rgba(244, 114, 182, 0.12);
            color: #f472b6;
        }

        /* ===== EMPTY ===== */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #9d6b8a;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 8px;
            opacity: 0.3;
            color: #ec4899;
        }

        .empty-state h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a1942;
        }

        .empty-state p {
            font-size: 0.6rem;
            margin-top: 4px;
            opacity: 0.6;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.20);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 28px 32px;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(244, 114, 182, 0.06);
            animation: modalIn 0.25s ease;
            transition: background 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .modal-header h2 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #4a1942;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #9d6b8a;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: rgba(244, 114, 182, 0.06);
            color: #be185d;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.55rem;
            font-weight: 600;
            color: #7a5a6a;
            margin-bottom: 2px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 7px 12px;
            border-radius: 10px;
            border: 1px solid rgba(244, 114, 182, 0.08);
            background: rgba(255, 255, 255, 0.4);
            font-family: inherit;
            font-size: 0.65rem;
            color: #4a1942;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: rgba(236, 72, 153, 0.2);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.04);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .color-option:hover {
            transform: scale(1.06);
        }

        .color-option.active {
            border-color: #4a1942;
            box-shadow: 0 0 0 2px rgba(74, 25, 66, 0.08);
        }

        body.dark .color-option.active {
            border-color: #f472b6;
            box-shadow: 0 0 0 2px rgba(244, 114, 182, 0.08);
        }

        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(244, 114, 182, 0.04);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 25, 66, 0.92);
            backdrop-filter: blur(12px);
            color: #fdf2f8;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.55rem;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(244, 114, 182, 0.06);
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== PRINT ===== */
        @media print {
            .btn,
            .header-actions,
            .note-actions,
            .modal-overlay,
            .container>.header-actions {
                display: none !important;
            }

            body {
                background: white !important;
                padding: 0 !important;
                color: black !important;
            }

            .container {
                box-shadow: none !important;
                backdrop-filter: none !important;
                background: white !important;
                border: none !important;
                padding: 20px !important;
                border-radius: 0 !important;
            }

            .note-card {
                break-inside: avoid;
                border: 1px solid #e5e7eb !important;
                background: white !important;
                box-shadow: none !important;
                page-break-inside: avoid;
            }

            .note-card .note-actions {
                display: none !important;
            }

            .notes-grid {
                display: block !important;
            }

            .note-card {
                margin-bottom: 16px !important;
            }

            .note-card .note-preview {
                -webkit-line-clamp: unset !important;
                overflow: visible !important;
                display: block !important;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .container {
                padding: 16px;
                border-radius: 20px;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .header-actions {
                justify-content: stretch;
            }

            .header-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .modal {
                padding: 20px;
                border-radius: 18px;
            }

            .logo-wrapper {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <div class="logo-wrapper">
                    <img src="https://raw.githubusercontent.com/lesehawio/NTS/main/NTS%20LOGO.png" alt="NTS" />
                </div>

            </div>
            <div class="header-actions">
                <button class="btn-icon" id="themeBtn" title="تغییر تم">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="btn btn-primary" id="newNoteBtn">
                    <i class="fas fa-plus"></i> جدید
                </button>
            </div>
        </header>

        <!-- NOTES LIST -->
        <div class="notes-header">
            <h2>یادداشت‌ها <span class="count" id="noteCount">۰</span></h2>
            <button class="btn" id="sortBtn" style="font-size:0.5rem;">
                <i class="fas fa-sort"></i>
            </button>
        </div>

        <div class="notes-grid" id="notesGrid">
            <!-- توسط JS پر می‌شود -->
        </div>

    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">یادداشت جدید</h2>
                <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            </div>
            <form id="noteForm">
                <input type="hidden" id="editId" value="" />
                <div class="form-group">
                    <label for="noteTitle">عنوان</label>
                    <input type="text" id="noteTitle" placeholder="عنوان..." />
                </div>
                <div class="form-group">
                    <label for="noteContent">متن</label>
                    <textarea id="noteContent" placeholder="متن یادداشت..."></textarea>
                </div>
                <div class="form-group">
                    <label>رنگ</label>
                    <div class="color-palette" id="colorPalette"></div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" id="modalCancel">انصراف</button>
                    <button type="submit" class="btn btn-primary" id="modalSubmit">
                        <i class="fas fa-save"></i> ذخیره
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 📓 دفترچه یادداشت — NTS
        // ============================================================

        let notes = [];
        let editingId = null;
        let sortAsc = true;
        let selectedColor = '#fdf2f8';
        let currentTheme = 'light';

        const colors = [
            { value: '#fdf2f8', label: 'صورتی ملایم' },
            { value: '#fce7f3', label: 'صورتی' },
            { value: '#fbcfe8', label: 'صورتی پررنگ' },
            { value: '#f9a8d4', label: 'صورتی تند' },
            { value: '#f472b6', label: 'صورتی اصلی' },
            { value: '#ffffff', label: 'سفید' },
            { value: '#fef3c7', label: 'کرم' },
            { value: '#e0f2fe', label: 'آبی ملایم' }
        ];

        const notesGrid = document.getElementById('notesGrid');
        const noteCount = document.getElementById('noteCount');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const editId = document.getElementById('editId');
        const noteTitle = document.getElementById('noteTitle');
        const noteContent = document.getElementById('noteContent');
        const colorPalette = document.getElementById('colorPalette');
        const noteForm = document.getElementById('noteForm');
        const toast = document.getElementById('toast');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');

        // ---- THEME ----
        function toggleTheme() {
            if (currentTheme === 'light') {
                document.body.classList.remove('light');
                document.body.classList.add('dark');
                currentTheme = 'dark';
                themeIcon.className = 'fas fa-sun';
                localStorage.setItem('nts_theme', 'dark');
            } else {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
                currentTheme = 'light';
                themeIcon.className = 'fas fa-moon';
                localStorage.setItem('nts_theme', 'light');
            }
        }

        function loadTheme() {
            const saved = localStorage.getItem('nts_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark');
                document.body.classList.remove('light');
                currentTheme = 'dark';
                themeIcon.className = 'fas fa-sun';
            } else {
                document.body.classList.add('light');
                document.body.classList.remove('dark');
                currentTheme = 'light';
                themeIcon.className = 'fas fa-moon';
            }
        }

        // ---- LOCALSTORAGE ----
        function loadNotes() {
            try {
                const data = localStorage.getItem('nts_notes');
                if (data) {
                    notes = JSON.parse(data);
                } else {
                    notes = [{
                        id: Date.now(),
                        title: 'به NTS خوش آمدید!',
                        content: 'این یک دفترچه یادداشت حرفه‌ای است.\nمی‌توانید یادداشت‌های خود را اینجا ذخیره کنید.',
                        color: '#fce7f3',
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    }];
                    saveNotes();
                }
            } catch (e) {
                notes = [];
            }
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem('nts_notes', JSON.stringify(notes));
            renderNotes();
        }

        // ---- RENDER ----
        function renderNotes() {
            const sorted = [...notes].sort((a, b) => {
                const diff = a.updatedAt - b.updatedAt;
                return sortAsc ? diff : -diff;
            });

            if (sorted.length === 0) {
                notesGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <h3>هیچ یادداشتی نیست</h3>
                        <p>اولین یادداشت را بنویسید</p>
                    </div>
                `;
            } else {
                notesGrid.innerHTML = sorted.map(note => `
                    <div class="note-card" style="background:${note.color || '#ffffff'}70;" data-id="${note.id}">
                        <div class="note-title">${note.title || 'بدون عنوان'}</div>
                        <div class="note-preview">${(note.content || '').substring(0, 80)}${(note.content || '').length > 80 ? '...' : ''}</div>
                        <div class="note-meta">
                            <span>${new Date(note.updatedAt).toLocaleDateString('fa-IR')}</span>
                            <button onclick="event.stopPropagation(); printNote('${note.id}')" style="background:transparent;border:none;color:#9d6b8a;cursor:pointer;font-size:0.5rem;">
                                <i class="fas fa-print"></i>
                            </button>
                        </div>
                        <div class="note-actions">
                            <button onclick="event.stopPropagation(); editNote('${note.id}')" title="ویرایش"><i class="fas fa-pen"></i></button>
                            <button onclick="event.stopPropagation(); deleteNote('${note.id}')" title="حذف"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            }

            noteCount.textContent = notes.length;
        }

        // ---- COLOR PALETTE ----
        function renderColorPalette(selected) {
            colorPalette.innerHTML = colors.map(c => `
                <div class="color-option ${selected === c.value ? 'active' : ''}" 
                     style="background:${c.value};" 
                     data-color="${c.value}"
                     title="${c.label}"></div>
            `).join('');

            document.querySelectorAll('.color-option').forEach(el => {
                el.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                    this.classList.add('active');
                    selectedColor = this.dataset.color;
                });
            });
        }

        // ---- PRINT SINGLE NOTE ----
        function printNote(id) {
            const note = notes.find(n => n.id == id);
            if (!note) return;

            const printWindow = window.open('', '_blank', 'width=500,height=500');
            if (!printWindow) {
                showToast('⚠️ پنجره بازشونده را مجاز کنید');
                return;
            }

            printWindow.document.write(`
                <!DOCTYPE html>
                <html dir="rtl">
                <head>
                    <meta charset="UTF-8" />
                    <title>${note.title || 'یادداشت'} · NTS</title>
                    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
                    <style>
                        * { margin:0; padding:0; box-sizing:border-box; }
                        body {
                            font-family: 'Vazirmatn', sans-serif;
                            padding: 30px;
                            background: white;
                            color: #1a1a2e;
                        }
                        .print-container {
                            max-width: 500px;
                            margin: 0 auto;
                            padding: 24px;
                            border: 1px solid #e5e7eb;
                            border-radius: 14px;
                        }
                        .print-logo {
                            width: 40px;
                            height: 40px;
                            object-fit: contain;
                            margin-bottom: 12px;
                        }
                        .print-title {
                            font-size: 1.2rem;
                            font-weight: 700;
                            color: #4a1942;
                            margin-bottom: 8px;
                        }
                        .print-content {
                            font-size: 0.85rem;
                            line-height: 1.8;
                            color: #333;
                            white-space: pre-wrap;
                            word-wrap: break-word;
                            background: ${note.color || '#fdf2f8'}40;
                            padding: 14px;
                            border-radius: 10px;
                            border-right: 3px solid ${note.color || '#ec4899'};
                        }
                        .print-footer {
                            margin-top: 16px;
                            padding-top: 12px;
                            border-top: 1px solid #f3e8f0;
                            font-size: 0.55rem;
                            color: #9d6b8a;
                            text-align: center;
                        }
                        @media print {
                            body { padding: 0; }
                            .print-container { border: none; box-shadow: none; padding: 16px; }
                        }
                    </style>
                </head>
                <body>
                    <div class="print-container">
                        <img class="print-logo" src="https://raw.githubusercontent.com/lesehawio/NTS/main/NTS%20LOGO.png" alt="NTS" />
                        <div class="print-title">${note.title || 'بدون عنوان'}</div>
                        <div class="print-content">${note.content || ''}</div>
                        <div class="print-footer">
                            NTS · ${new Date(note.updatedAt).toLocaleDateString('fa-IR')}
                        </div>
                    </div>
                    <script>
                        window.onload = function() {
                            window.print();
                            setTimeout(function() { window.close(); }, 1000);
                        };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        // ---- CRUD ----
        function openModal(note = null) {
            if (note) {
                modalTitle.textContent = 'ویرایش یادداشت';
                editId.value = note.id;
                noteTitle.value = note.title || '';
                noteContent.value = note.content || '';
                selectedColor = note.color || '#fdf2f8';
                editingId = note.id;
            } else {
                modalTitle.textContent = 'یادداشت جدید';
                editId.value = '';
                noteTitle.value = '';
                noteContent.value = '';
                selectedColor = '#fdf2f8';
                editingId = null;
            }
            renderColorPalette(selectedColor);
            modalOverlay.classList.add('active');
            setTimeout(() => noteTitle.focus(), 100);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            editingId = null;
        }

        window.editNote = function(id) {
            const note = notes.find(n => n.id == id);
            if (note) openModal(note);
        };

        window.deleteNote = function(id) {
            if (confirm('حذف شود؟')) {
                notes = notes.filter(n => n.id != id);
                saveNotes();
                showToast('🗑️ حذف شد');
            }
        };

        function saveNoteFromForm(e) {
            e.preventDefault();
            const title = noteTitle.value.trim() || 'بدون عنوان';
            const content = noteContent.value.trim();

            if (!content) {
                showToast('⚠️ متن را بنویسید');
                return;
            }

            const now = Date.now();

            if (editingId) {
                const index = notes.findIndex(n => n.id == editingId);
                if (index !== -1) {
                    notes[index] = { ...notes[index], title, content, color: selectedColor, updatedAt: now };
                }
            } else {
                notes.push({ id: now, title, content, color: selectedColor, createdAt: now, updatedAt: now });
            }

            saveNotes();
            closeModal();
            showToast(editingId ? '✅ ویرایش شد' : '✅ ذخیره شد');
        }

        // ---- TOAST ----
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ---- EVENTS ----
        document.getElementById('newNoteBtn').addEventListener('click', () => openModal(null));
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalCancel').addEventListener('click', closeModal);
        themeBtn.addEventListener('click', toggleTheme);

        document.getElementById('sortBtn').addEventListener('click', () => {
            sortAsc = !sortAsc;
            renderNotes();
            showToast(sortAsc ? 'جدیدترین' : 'قدیمی‌ترین');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        noteForm.addEventListener('submit', saveNoteFromForm);

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                openModal(null);
            }
            if (e.key === 'Escape') {
                if (modalOverlay.classList.contains('active')) closeModal();
            }
        });

        // ---- INIT ----
        loadTheme();
        loadNotes();
        renderColorPalette('#fdf2f8');

        console.log('📓 ');
        console.log(`📝 ${notes.length} یادداشت`);
    </script>

</body>
</html>
