<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💗 NTS · دفترچه یادداشت</title>
    <link rel="icon" href="https://raw.githubusercontent.com/lesehawio/NTS/main/NTSLOGO2.png" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-50: #fdf2f8;
            --pink-100: #fce7f3;
            --pink-200: #fbcfe8;
            --pink-300: #f9a8d4;
            --pink-400: #f472b6;
            --pink-500: #ec4899;
            --pink-600: #db2777;
            --pink-700: #be185d;
            --radius: 16px;
            --radius-xl: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 20px rgba(236, 72, 153, 0.08);
            --shadow-hover: 0 8px 32px rgba(236, 72, 153, 0.12);
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            color: #4a1942;
            transition: all var(--transition);
        }

        body.dark {
            background: linear-gradient(135deg, #1a0a1a 0%, #2d1a2d 100%);
            color: #f5e6f0;
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px;
            border-bottom: 2px solid rgba(236, 72, 153, 0.08);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo img {
            height: 44px;
            width: auto;
        }

        .logo span {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--pink-600);
            letter-spacing: -0.5px;
        }

        body.dark .logo span {
            color: var(--pink-400);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(236, 72, 153, 0.06);
            color: var(--pink-700);
        }

        body.dark .btn {
            background: rgba(255, 255, 255, 0.04);
            color: #f0e6ee;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
            color: #fff;
            box-shadow: 0 4px 16px rgba(236, 72, 153, 0.2);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(236, 72, 153, 0.3);
            transform: translateY(-2px);
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
            background: rgba(236, 72, 153, 0.04);
            font-size: 1rem;
        }

        .btn-icon:hover {
            background: rgba(236, 72, 153, 0.08);
        }

        /* ===== SEARCH ===== */
        .search-bar {
            margin: 14px 0 16px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 18px 10px 44px;
            border-radius: 40px;
            border: 1px solid rgba(236, 72, 153, 0.08);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            font-family: inherit;
            font-size: 0.8rem;
            color: #4a1942;
            outline: none;
            transition: all var(--transition);
        }

        body.dark .search-bar input {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.04);
            color: #f0e6ee;
        }

        .search-bar input:focus {
            border-color: var(--pink-300);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.04);
        }

        .search-bar i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-300);
            font-size: 0.8rem;
        }

        .search-bar .clear-btn {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 4px;
            display: none;
            font-size: 0.7rem;
        }

        .search-bar .clear-btn:hover {
            color: var(--pink-500);
        }

        /* ===== FILTERS ===== */
        .filters {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(236, 72, 153, 0.06);
            background: transparent;
            font-family: inherit;
            font-size: 0.65rem;
            font-weight: 500;
            color: #b08a9a;
            cursor: pointer;
            transition: all var(--transition);
        }

        body.dark .filter-btn {
            border-color: rgba(255, 255, 255, 0.04);
            color: #888;
        }

        .filter-btn:hover {
            background: rgba(236, 72, 153, 0.04);
            color: var(--pink-700);
        }

        .filter-btn.active {
            background: rgba(236, 72, 153, 0.06);
            border-color: var(--pink-300);
            color: var(--pink-600);
        }

        body.dark .filter-btn.active {
            background: rgba(236, 72, 153, 0.08);
            color: var(--pink-400);
        }

        /* ===== NOTES ===== */
        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .notes-header h2 {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a1942;
        }

        body.dark .notes-header h2 {
            color: #f0e6ee;
        }

        .notes-header .count {
            font-size: 0.65rem;
            color: #b08a9a;
            background: rgba(236, 72, 153, 0.04);
            padding: 2px 12px;
            border-radius: 40px;
        }

        body.dark .notes-header .count {
            background: rgba(255, 255, 255, 0.04);
            color: #888;
        }

        /* ===== GRID ===== */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        /* ===== CARD ===== */
        .note-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 18px 20px;
            border: 1px solid rgba(236, 72, 153, 0.04);
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 130px;
            animation: fadeUp 0.3s ease;
        }

        body.dark .note-card {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.03);
        }

        .note-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(236, 72, 153, 0.08);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-card .title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #4a1942;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        body.dark .note-card .title {
            color: #f0e6ee;
        }

        .note-card .preview {
            font-size: 0.75rem;
            color: #8a6a7a;
            line-height: 1.7;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-wrap;
            word-break: break-word;
        }

        body.dark .note-card .preview {
            color: #aaa;
        }

        .note-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(236, 72, 153, 0.04);
            font-size: 0.55rem;
            color: #b08a9a;
        }

        body.dark .note-card .meta {
            border-top-color: rgba(255, 255, 255, 0.04);
            color: #888;
        }

        .note-card .meta-actions {
            display: flex;
            gap: 2px;
        }

        .note-card .meta-actions button {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 0.7rem;
            transition: all var(--transition);
        }

        .note-card .meta-actions button:hover {
            background: rgba(236, 72, 153, 0.04);
            color: var(--pink-500);
        }

        body.dark .note-card .meta-actions button:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--pink-400);
        }

        /* ===== EMPTY ===== */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: #ccc;
        }

        .empty i {
            font-size: 2.5rem;
            color: var(--pink-200);
            margin-bottom: 10px;
            display: block;
        }

        body.dark .empty i {
            color: #333;
        }

        .empty h3 {
            font-size: 0.9rem;
            color: #888;
            font-weight: 500;
        }

        body.dark .empty h3 {
            color: #aaa;
        }

        .empty p {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #bbb;
        }

        /* ============================================================ */
        /* ===== MODAL - مشاهده + ویرایش ===== */
        /* ============================================================ */

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            border-radius: var(--radius-xl);
            padding: 28px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: modalIn 0.25s ease;
        }

        body.dark .modal {
            background: rgba(20, 10, 20, 0.92);
            border-color: rgba(255, 255, 255, 0.03);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .modal-header .info {
            flex: 1;
        }

        .modal-header .info h2 {
            font-size: 1rem;
            font-weight: 700;
            color: #4a1942;
            line-height: 1.4;
        }

        body.dark .modal-header .info h2 {
            color: #f0e6ee;
        }

        .modal-header .info .modal-date {
            font-size: 0.6rem;
            color: #bbb;
            margin-top: 2px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #ccc;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: rgba(236, 72, 153, 0.04);
            color: var(--pink-500);
            transform: rotate(90deg);
        }

        /* ===== حالت مشاهده ===== */
        .modal-view .modal-body {
            font-size: 0.9rem;
            line-height: 2.2;
            color: #444;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 12px 0;
            min-height: 80px;
        }

        body.dark .modal-view .modal-body {
            color: #ddd;
        }

        /* ===== حالت ویرایش ===== */
        .modal-edit .modal-body input,
        .modal-edit .modal-body textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid rgba(236, 72, 153, 0.06);
            background: rgba(255, 255, 255, 0.3);
            font-family: inherit;
            font-size: 0.85rem;
            color: #4a1942;
            outline: none;
            transition: all var(--transition);
        }

        body.dark .modal-edit .modal-body input,
        body.dark .modal-edit .modal-body textarea {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.04);
            color: #f0e6ee;
        }

        .modal-edit .modal-body input:focus,
        .modal-edit .modal-body textarea:focus {
            border-color: var(--pink-300);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.04);
        }

        .modal-edit .modal-body input {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .modal-edit .modal-body textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.8;
        }

        /* ===== رنگ‌های پالت ===== */
        .color-palette {
            display: flex;
            gap: 8px;
            padding: 6px 0 2px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .color-option:hover {
            transform: scale(1.08);
        }

        .color-option.active {
            border-color: #4a1942;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.06);
        }

        body.dark .color-option.active {
            border-color: var(--pink-400);
        }

        /* ===== فوتر مودال با آیکون‌ها ===== */
        .modal-footer {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(236, 72, 153, 0.04);
            flex-wrap: wrap;
        }

        body.dark .modal-footer {
            border-top-color: rgba(255, 255, 255, 0.04);
        }

        .modal-footer .btn-footer {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(236, 72, 153, 0.04);
            color: var(--pink-700);
        }

        body.dark .modal-footer .btn-footer {
            background: rgba(255, 255, 255, 0.04);
            color: #f0e6ee;
        }

        .modal-footer .btn-footer:hover {
            background: rgba(236, 72, 153, 0.08);
            transform: translateY(-2px);
        }

        .modal-footer .btn-footer-primary {
            background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
            color: #fff;
            box-shadow: 0 4px 16px rgba(236, 72, 153, 0.15);
        }

        .modal-footer .btn-footer-primary:hover {
            box-shadow: 0 6px 24px rgba(236, 72, 153, 0.25);
        }

        .modal-footer .btn-footer-danger {
            background: rgba(231, 76, 60, 0.06);
            color: #e74c3c;
        }

        .modal-footer .btn-footer-danger:hover {
            background: rgba(231, 76, 60, 0.12);
        }

        body.dark .modal-footer .btn-footer-danger {
            background: rgba(231, 76, 60, 0.08);
            color: #e74c3c;
        }

        body.dark .modal-footer .btn-footer-danger:hover {
            background: rgba(231, 76, 60, 0.15);
        }

        /* ============================================================ */
        /* ===== PRINT - صفحه چاپ اختصاصی ===== */
        /* ============================================================ */

        .print-container {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            .print-container,
            .print-container * {
                visibility: visible;
            }

            .print-container {
                display: block !important;
                position: fixed;
                inset: 0;
                background: white;
                padding: 40px 50px;
                font-family: 'Vazirmatn', sans-serif;
                direction: rtl;
                color: #1a0f1a;
                z-index: 999999;
                overflow-y: auto;
            }

            .print-container .print-logo {
                text-align: center;
                margin-bottom: 12px;
            }

            .print-container .print-logo img {
                height: 50px;
                width: auto;
            }

            .print-container .print-title {
                font-size: 1.5rem;
                font-weight: 800;
                text-align: center;
                margin-bottom: 2px;
                color: #1a0f1a;
            }

            .print-container .print-divider {
                border: none;
                border-top: 2px solid #fce7f3;
                margin: 10px 0 14px;
            }

            .print-container .print-body {
                font-size: 0.95rem;
                line-height: 2.2;
                color: #333;
                white-space: pre-wrap;
                word-break: break-word;
                padding: 6px 0;
                min-height: 150px;
            }

            .print-container .print-footer {
                margin-top: 20px;
                padding-top: 12px;
                border-top: 1px solid #fce7f3;
                display: flex;
                justify-content: space-between;
                font-size: 0.6rem;
                color: #bbb;
            }

            .print-container .print-footer .print-brand {
                color: #ccc;
                font-weight: 500;
            }

            .print-container .print-footer .print-brand span {
                color: #ec4899;
            }

            .print-container .print-footer .print-date {
                color: #bbb;
            }

            .print-container .print-page-break {
                page-break-after: always;
                border: none;
                margin: 20px 0;
            }
        }

        /* ============================================================ */
        /* ===== TOAST ===== */
        /* ============================================================ */

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(74, 25, 66, 0.92);
            backdrop-filter: blur(12px);
            color: #fdf2f8;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            border: 1px solid rgba(236, 72, 153, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        }

        body.light .toast {
            background: rgba(255, 255, 255, 0.92);
            color: #4a1942;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============================================================ */
        /* ===== RESPONSIVE ===== */
        /* ============================================================ */

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }

            .logo img {
                height: 36px;
            }

            .logo span {
                font-size: 1rem;
            }

            .btn-primary {
                padding: 6px 12px;
                font-size: 0.65rem;
            }

            .btn-primary span {
                display: none;
            }

            .btn-icon {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }

            .notes-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .modal {
                padding: 20px;
                margin: 10px;
                border-radius: var(--radius);
            }

            .note-card {
                padding: 14px 16px;
                min-height: 110px;
            }

            .note-card .title {
                font-size: 0.85rem;
            }

            .note-card .preview {
                font-size: 0.7rem;
            }

            .modal-footer .btn-footer {
                padding: 6px 12px;
                font-size: 0.65rem;
            }

            @media print {
                .print-container {
                    padding: 20px !important;
                }
                .print-container .print-title {
                    font-size: 1.2rem;
                }
                .print-container .print-body {
                    font-size: 0.85rem;
                }
                .print-container .print-logo img {
                    height: 40px;
                }
            }
        }
    </style>
</head>
<body>

    <div class="app">

        <!-- HEADER -->
        <header class="header">
            <a class="logo" href="#">
                <img src="https://raw.githubusercontent.com/lesehawio/NTS/main/NTSLOGO2.png" alt="NTS" />
            </a>
            <div class="header-actions">
                <button class="btn btn-icon" id="themeBtn" title="تغییر تم">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="btn btn-primary" id="newNoteBtn">
                    <i class="fas fa-plus"></i>
                    <span>جدید</span>
                </button>
            </div>
        </header>

        <!-- SEARCH -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجو..." />
            <button class="clear-btn" id="clearSearch"><i class="fas fa-times"></i></button>
        </div>

        <!-- FILTERS -->
        <div class="filters" id="filterGroup">
            <button class="filter-btn active" data-filter="all">همه</button>
            <button class="filter-btn" data-filter="today">امروز</button>
            <button class="filter-btn" data-filter="week">این هفته</button>
            <button class="filter-btn" data-filter="month">این ماه</button>
        </div>

        <!-- NOTES -->
        <div class="notes-header">
            <h2>یادداشت‌ها <span class="count" id="noteCount">۰</span></h2>
        </div>

        <div class="notes-grid" id="notesGrid"></div>

    </div>

    <!-- MODAL - مشاهده + ویرایش -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div class="info">
                    <h2 id="modalTitle">عنوان یادداشت</h2>
                    <div class="modal-date" id="modalDate">تاریخ</div>
                </div>
                <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                متن یادداشت...
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- توسط JS پر میشه -->
            </div>
        </div>
    </div>

    <!-- PRINT CONTAINER -->
    <div class="print-container" id="printContainer"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ===== STATE =====
            let notes = [];
            let viewingId = null;
            let currentFilter = 'all';
            let searchQuery = '';
            let currentTheme = 'light';
            let selectedColor = '#ffffff';
            let isEditMode = false;

            // ===== DOM =====
            const $ = id => document.getElementById(id);
            const notesGrid = $('notesGrid');
            const noteCount = $('noteCount');
            const modalOverlay = $('modalOverlay');
            const modal = $('modal');
            const modalTitle = $('modalTitle');
            const modalDate = $('modalDate');
            const modalBody = $('modalBody');
            const modalFooter = $('modalFooter');
            const modalClose = $('modalClose');
            const toast = $('toast');
            const themeBtn = $('themeBtn');
            const themeIcon = $('themeIcon');
            const searchInput = $('searchInput');
            const clearSearch = $('clearSearch');
            const filterGroup = $('filterGroup');
            const printContainer = $('printContainer');

            // ===== COLORS =====
            const colors = [
                { value: '#ffffff', label: 'سفید' },
                { value: '#fdf2f8', label: 'صورتی ملایم' },
                { value: '#fce7f3', label: 'صورتی' },
                { value: '#fbcfe8', label: 'صورتی پررنگ' },
                { value: '#f9a8d4', label: 'صورتی تند' },
                { value: '#fef3c7', label: 'کرم' },
                { value: '#e0f2fe', label: 'آبی ملایم' },
                { value: '#d1fae5', label: 'سبز ملایم' }
            ];

            // ===== THEME =====
            function toggleTheme() {
                if (currentTheme === 'light') {
                    document.body.classList.add('dark');
                    document.body.classList.remove('light');
                    currentTheme = 'dark';
                    themeIcon.className = 'fas fa-sun';
                    localStorage.setItem('nts_theme', 'dark');
                } else {
                    document.body.classList.remove('dark');
                    document.body.classList.add('light');
                    currentTheme = 'light';
                    themeIcon.className = 'fas fa-moon';
                    localStorage.setItem('nts_theme', 'light');
                }
            }

            function loadTheme() {
                const saved = localStorage.getItem('nts_theme');
                if (saved === 'dark') {
                    document.body.classList.add('dark');
                    currentTheme = 'dark';
                    themeIcon.className = 'fas fa-sun';
                } else {
                    document.body.classList.add('light');
                    currentTheme = 'light';
                    themeIcon.className = 'fas fa-moon';
                }
            }

            // ===== STORAGE =====
            function loadNotes() {
                try {
                    const data = localStorage.getItem('nts_notes');
                    if (data) {
                        notes = JSON.parse(data);
                        notes = notes.filter(n => n && typeof n === 'object').map(n => ({
                            id: n.id || Date.now() + Math.random() * 1000,
                            title: n.title || 'بدون عنوان',
                            content: n.content || '',
                            color: n.color || '#ffffff',
                            createdAt: n.createdAt || Date.now(),
                            updatedAt: n.updatedAt || Date.now()
                        }));
                    } else {
                        notes = [{
                            id: Date.now(),
                            title: '💗 به NTS خوش آمدید!',
                            content: 'یادداشت‌های قشنگت رو اینجا بنویس.\nبرای مشاهده روی کارت کلیک کن.\nبرای چاپ روی دکمه پرینتر کلیک کن.',
                            color: '#fce7f3',
                            createdAt: Date.now(),
                            updatedAt: Date.now()
                        }];
                        saveNotes();
                    }
                } catch (e) {
                    notes = [];
                }
                renderNotes();
            }

            function saveNotes() {
                localStorage.setItem('nts_notes', JSON.stringify(notes));
                renderNotes();
            }

            // ===== FILTER & SEARCH =====
            function getFiltered() {
                let filtered = [...notes];
                const now = Date.now();
                const day = 86400000;

                switch (currentFilter) {
                    case 'today':
                        filtered = filtered.filter(n => now - n.updatedAt < day);
                        break;
                    case 'week':
                        filtered = filtered.filter(n => now - n.updatedAt < day * 7);
                        break;
                    case 'month':
                        filtered = filtered.filter(n => now - n.updatedAt < day * 30);
                        break;
                }

                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    filtered = filtered.filter(n =>
                        n.title.toLowerCase().includes(q) ||
                        n.content.toLowerCase().includes(q)
                    );
                }

                filtered.sort((a, b) => b.updatedAt - a.updatedAt);
                return filtered;
            }

            // ===== RENDER =====
            function renderNotes() {
                const filtered = getFiltered();

                if (filtered.length === 0) {
                    notesGrid.innerHTML = `
                        <div class="empty">
                            <i class="fas fa-heart"></i>
                            <h3>${searchQuery ? 'نتیجه‌ای یافت نشد' : 'یادداشتی نیست!'}</h3>
                            <p>${searchQuery ? 'جستجوی دیگری امتحان کن' : 'اولین یادداشت قشنگت رو بنویس'}</p>
                        </div>
                    `;
                    noteCount.textContent = '۰';
                    return;
                }

                notesGrid.innerHTML = filtered.map(n => `
                    <div class="note-card" data-id="${n.id}" style="background:${n.color || '#ffffff'}70;">
                        <div class="title">${n.title || 'بدون عنوان'}</div>
                        <div class="preview">${(n.content || '').substring(0, 100)}${(n.content || '').length > 100 ? '...' : ''}</div>
                        <div class="meta">
                            <span>${new Date(n.updatedAt).toLocaleDateString('fa-IR')}</span>
                            <div class="meta-actions">
                                <button onclick="event.stopPropagation(); window.printNote('${n.id}')" title="چاپ">
                                    <i class="fas fa-print"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                noteCount.textContent = filtered.length;
            }

            // ===== COLOR PALETTE =====
            function renderColorPalette(selected) {
                const container = document.createElement('div');
                container.className = 'color-palette';
                container.id = 'colorPalette';
                container.innerHTML = colors.map(c => `
                    <div class="color-option ${selected === c.value ? 'active' : ''}" 
                         style="background:${c.value};" 
                         data-color="${c.value}"
                         title="${c.label}"></div>
                `).join('');

                container.querySelectorAll('.color-option').forEach(el => {
                    el.addEventListener('click', function() {
                        container.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                        this.classList.add('active');
                        selectedColor = this.dataset.color;
                    });
                });

                return container;
            }

            // ===== PRINT =====
            function printNote(id) {
                const note = notes.find(n => n.id == id);
                if (!note) return;

                printContainer.innerHTML = `
                    <div class="print-page">
                        <div class="print-logo">
                            <img src="https://raw.githubusercontent.com/lesehawio/NTS/main/NTS%20LOGO.png" alt="NTS" />
                        </div>
                        <div class="print-title">${note.title || 'بدون عنوان'}</div>
                        <hr class="print-divider" />
                        <div class="print-body" style="background:${note.color || '#ffffff'}20;border-right:3px solid ${note.color || '#ec4899'};padding:12px 16px;border-radius:12px;">
                            ${note.content || ''}
                        </div>
                        <hr class="print-divider" />
                        <div class="print-footer">
                            <span class="print-date">${new Date(note.updatedAt).toLocaleDateString('fa-IR')}</span>
                            <span class="print-brand">NTS <span>دفترچه یادداشت</span></span>
                        </div>
                    </div>
                `;

                window.print();
            }

            // ===== MODAL - VIEW =====
            function openModal(id) {
                const note = notes.find(n => n.id == id);
                if (!note) return;

                viewingId = id;
                isEditMode = false;

                modal.className = 'modal modal-view';
                modalTitle.textContent = note.title || 'بدون عنوان';
                modalDate.textContent = new Date(note.updatedAt).toLocaleDateString('fa-IR') + ' · ' +
                    new Date(note.updatedAt).toLocaleTimeString('fa-IR');
                modalBody.textContent = note.content || '';
                modalBody.style.background = (note.color || '#ffffff') + '20';
                modalBody.style.borderRight = '3px solid ' + (note.color || '#ec4899');
                modalBody.style.padding = '12px 16px';
                modalBody.style.borderRadius = '12px';

                modalFooter.innerHTML = `
                    <button class="btn-footer" onclick="window.printNote('${id}')">
                        <i class="fas fa-print"></i> چاپ
                    </button>
                    <button class="btn-footer" onclick="window.editNote('${id}')">
                        <i class="fas fa-pen"></i> ویرایش
                    </button>
                    <button class="btn-footer btn-footer-danger" onclick="window.deleteNote('${id}')">
                        <i class="fas fa-trash"></i> حذف
                    </button>
                `;

                modalOverlay.classList.add('active');
            }

            // ===== MODAL - EDIT =====
            function openEditModal(id) {
                const note = notes.find(n => n.id == id);
                if (!note) return;

                viewingId = id;
                isEditMode = true;
                selectedColor = note.color || '#ffffff';

                modal.className = 'modal modal-edit';
                modalTitle.innerHTML = `
                    <input type="text" id="editTitle" value="${note.title || ''}" placeholder="عنوان..." maxlength="100" style="width:100%;font-family:inherit;font-size:1rem;font-weight:700;border:none;border-bottom:2px solid transparent;background:transparent;color:inherit;outline:none;padding:2px 0;" />
                `;
                modalTitle.querySelector('input').focus();

                modalDate.textContent = 'در حال ویرایش...';

                modalBody.innerHTML = `
                    <textarea id="editContent" placeholder="متن یادداشت..." rows="4" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(236,72,153,0.06);background:rgba(255,255,255,0.3);font-family:inherit;font-size:0.85rem;color:inherit;outline:none;resize:vertical;min-height:100px;line-height:1.8;">${note.content || ''}</textarea>
                    <div id="colorPaletteContainer"></div>
                `;

                const paletteContainer = document.getElementById('colorPaletteContainer');
                const palette = renderColorPalette(selectedColor);
                paletteContainer.appendChild(palette);

                modalFooter.innerHTML = `
                    <button class="btn-footer" id="editCancelBtn">
                        <i class="fas fa-times"></i> انصراف
                    </button>
                    <button class="btn-footer btn-footer-primary" id="editSaveBtn">
                        <i class="fas fa-save"></i> ذخیره
                    </button>
                `;

                document.getElementById('editCancelBtn').addEventListener('click', () => {
                    openModal(id);
                });

                document.getElementById('editSaveBtn').addEventListener('click', () => {
                    saveEdit(id);
                });

                modalOverlay.classList.add('active');

                // Enter in title -> focus content
                document.getElementById('editTitle').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        document.getElementById('editContent').focus();
                    }
                });

                // Ctrl+Enter in content -> save
                document.getElementById('editContent').addEventListener('keydown', function(e) {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        e.preventDefault();
                        saveEdit(id);
                    }
                });
            }

            function saveEdit(id) {
                const titleInput = document.getElementById('editTitle');
                const contentInput = document.getElementById('editContent');

                const title = titleInput?.value.trim() || 'بدون عنوان';
                const content = contentInput?.value.trim();

                if (!content) {
                    showToast('💗 لطفاً متن یادداشت را بنویس');
                    contentInput?.focus();
                    return;
                }

                const idx = notes.findIndex(n => n.id == id);
                if (idx !== -1) {
                    notes[idx] = {
                        ...notes[idx],
                        title,
                        content,
                        color: selectedColor,
                        updatedAt: Date.now()
                    };
                    saveNotes();
                    showToast('✅ یادداشت ویرایش شد');
                    openModal(id);
                }
            }

            // ===== CRUD =====
            window.editNote = function(id) {
                openEditModal(id);
            };

            window.deleteNote = function(id) {
                if (confirm('آیا از حذف این یادداشت مطمئن هستی؟')) {
                    notes = notes.filter(n => n.id != id);
                    saveNotes();
                    if (modalOverlay.classList.contains('active')) {
                        modalOverlay.classList.remove('active');
                    }
                    showToast('🗑️ یادداشت حذف شد');
                }
            };

            window.printNote = printNote;

            function closeModal() {
                modalOverlay.classList.remove('active');
                viewingId = null;
                isEditMode = false;
            }

            // ===== NEW NOTE =====
            function newNote() {
                const now = Date.now();
                const newNoteObj = {
                    id: now + Math.random() * 1000,
                    title: 'یادداشت جدید',
                    content: 'متن یادداشت را اینجا بنویس...',
                    color: '#ffffff',
                    createdAt: now,
                    updatedAt: now
                };
                notes.push(newNoteObj);
                saveNotes();
                showToast('✅ یادداشت جدید ایجاد شد');
                openEditModal(newNoteObj.id);
            }

            // ===== TOAST =====
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // ===== EVENTS =====
            document.getElementById('newNoteBtn').addEventListener('click', newNote);
            modalClose.addEventListener('click', closeModal);

            themeBtn.addEventListener('click', toggleTheme);

            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                clearSearch.style.display = searchQuery ? 'block' : 'none';
                renderNotes();
            });

            clearSearch.addEventListener('click', function() {
                searchInput.value = '';
                searchQuery = '';
                this.style.display = 'none';
                renderNotes();
                searchInput.focus();
            });

            filterGroup.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    filterGroup.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderNotes();
                });
            });

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // Click on note card -> open view
            notesGrid.addEventListener('click', function(e) {
                const card = e.target.closest('.note-card');
                if (card) {
                    const id = card.dataset.id;
                    const note = notes.find(n => n.id == id);
                    if (note) openModal(id);
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    newNote();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    searchInput.focus();
                }
                if (e.key === 'Escape') {
                    if (modalOverlay.classList.contains('active')) closeModal();
                }
            });

            // ===== EXPOSE =====
            window.openModal = openModal;
            window.openEditModal = openEditModal;
            window.closeModal = closeModal;

            // ===== INIT =====
            loadTheme();
            loadNotes();

            console.log('💗 NTS · دفترچه یادداشت دخترونه');
            console.log('⌨️  Ctrl+N : جدید  |  Ctrl+F : جستجو');
            console.log('🖨️  دکمه چاپ → چاپ با لوگو و عنوان');

        })();
    </script>

</body>
</html>
